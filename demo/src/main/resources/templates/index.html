<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head">
    <title>Liste des étudiants</title>
</head>
<body>

<div th:replace="fragments/layout :: navbar"></div>

<div class="container mt-5">
    <h1 class="mb-4">Gestion des étudiants</h1>

    <div th:if="${#lists.isEmpty(students)}" class="alert alert-info">
        Aucun étudiant enregistré pour le moment.
    </div>

    <div th:unless="${#lists.isEmpty(students)}">
        <p>Total : <strong th:text="${students.size()}"></strong> étudiant(s)</p>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nom complet</th>
                <th>Email</th>
                <th>Niveau</th>
                <th>Filière</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.id}"></td>
                <td th:text="${student.firstName + ' ' + student.lastName}"></td>
                <td th:text="${student.email}"></td>
                <td th:text="${student.level}"></td>
                <td th:text="${student.major ?: 'Non défini'}"></td>
                <td>
                    <a th:href="@{/edit/{id}(id=${student.id})}" class="btn btn-sm btn-warning">Modifier</a>
                    <a th:href="@{/delete/{id}(id=${student.id})}"
                       onclick="return confirm('Confirmer la suppression ?')"
                       class="btn btn-sm btn-danger">Supprimer</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <a href="/signup" class="btn btn-success mt-3">Ajouter un étudiant</a>
</div>

<div th:replace="fragments/layout :: footer"></div>
</body>
</html>
